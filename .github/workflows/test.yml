name: Test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  frontend-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript typecheck
        run: pnpm typecheck

      - name: Biome lint + format check
        run: pnpm lint

  rust-lint:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install NASM (openh264-sys2 native assembly)
        run: brew install nasm

      - name: cargo fmt --check
        working-directory: src-tauri
        run: cargo fmt --check

      - name: cargo clippy -D warnings
        working-directory: src-tauri
        run: cargo clippy --all-targets -- -D warnings

  test:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-22.04]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux native dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            libdbus-1-dev \
            libpipewire-0.3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libx11-dev \
            libxdo-dev \
            libxi-dev \
            libxtst-dev \
            nasm \
            pkg-config \
            wget

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # NASM is required by the openh264-sys2 build (H.264 encoder native assembly)
      - name: Install NASM (macOS)
        if: matrix.os == 'macos-latest'
        run: brew install nasm

      - name: Install NASM (Windows)
        if: matrix.os == 'windows-latest'
        uses: ilammy/setup-nasm@v1

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Make clang_rt discoverable (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          RT=$(find /Applications/Xcode*.app /Library/Developer/CommandLineTools \
                 -name 'libclang_rt.osx.a' 2>/dev/null | head -1)
          if [ -n "$RT" ]; then
            echo "clang_rt found: $RT"
            echo "LIBRARY_PATH=$(dirname "$RT"):${LIBRARY_PATH:-}" >> "$GITHUB_ENV"
          else
            echo "::warning::libclang_rt.osx.a not found on the runner"
          fi

      - name: Run Rust tests
        run: cd src-tauri && cargo test

      - name: Run frontend tests
        run: pnpm test

  coverage:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install NASM (openh264-sys2)
        run: brew install nasm

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Make clang_rt discoverable for coverage instrumentation
        run: |
          # cargo-llvm-cov's `-C instrument-coverage` links libclang_rt.osx.a,
          # which some macOS runner Xcodes (e.g. 16.4 / clang 17) don't expose at
          # the default clang resource path — the linker then fails with
          # "library 'clang_rt.osx' not found". Find it wherever it lives and add
          # its directory to LIBRARY_PATH so the link resolves regardless of the
          # active Xcode version.
          RT=$(find /Applications/Xcode*.app /Library/Developer/CommandLineTools \
                 -name 'libclang_rt.osx.a' 2>/dev/null | head -1)
          if [ -n "$RT" ]; then
            echo "clang_rt found: $RT"
            echo "LIBRARY_PATH=$(dirname "$RT"):${LIBRARY_PATH:-}" >> "$GITHUB_ENV"
          else
            echo "::warning::libclang_rt.osx.a not found on the runner"
          fi

      # Ratchet baseline: total line coverage sits ~45% after excluding native
      # macOS permission/onboarding glue that's impractical to unit-test in CI.
      # The testable core stays high (playback ~96%, event_capture ~95%,
      # recordings_store ~88%). TODO: keep refining coverage around integration
      # files and raise this back up.
      - name: Rust coverage gate (fail under 44% lines)
        working-directory: src-tauri
        run: cargo llvm-cov --ignore-filename-regex '(permissions|ocr_macos|space_watch|probe|power)\.rs$' --fail-under-lines 44 --summary-only

      - name: Frontend coverage gate (vitest thresholds in vitest.config.ts)
        run: pnpm test:coverage

  mutation:
    # Mutation testing on the four deepened modules (see mutants.toml).
    # Runs on PRs only against changed files for tractable runtime;
    # main pushes run the full scoped sweep.
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # need base ref for --in-diff

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install NASM (openh264-sys2)
        run: brew install nasm

      - name: Install cargo-mutants
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-mutants

      - name: Make clang_rt discoverable
        run: |
          RT=$(find /Applications/Xcode*.app /Library/Developer/CommandLineTools \
                 -name 'libclang_rt.osx.a' 2>/dev/null | head -1)
          if [ -n "$RT" ]; then
            echo "clang_rt found: $RT"
            echo "LIBRARY_PATH=$(dirname "$RT"):${LIBRARY_PATH:-}" >> "$GITHUB_ENV"
          else
            echo "::warning::libclang_rt.osx.a not found on the runner"
          fi

      - name: Mutation gate (PR — changed files only)
        if: github.event_name == 'pull_request'
        working-directory: src-tauri
        run: |
          # Two-dot diff (base..HEAD) gives exactly what this PR's commits
          # changed, regardless of whether the branch is up-to-date with base.
          # Three-dot would anchor on the merge base and include unrelated
          # commits from main if the branch is behind.
          git diff ${{ github.event.pull_request.base.sha }}..HEAD > /tmp/pr.diff
          cargo mutants --in-diff /tmp/pr.diff --no-shuffle

      - name: Mutation gate (main — full scoped sweep)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        working-directory: src-tauri
        run: cargo mutants --no-shuffle
